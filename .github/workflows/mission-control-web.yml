name: Mission Control Web

on:
    push:
        branches: [main, "feature/**"]
        paths:
            - "apps/mission-control-ui/**"
            - ".github/workflows/mission-control-web.yml"
    pull_request:
        paths:
            - "apps/mission-control-ui/**"

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: apps/mission-control-ui/package-lock.json

            - name: Install dependencies
              run: |
                  cd apps/mission-control-ui
                  npm install --legacy-peer-deps

            - name: Build Web
              run: |
                  cd apps/mission-control-ui
                  npm run build:web

            - name: Deploy to Firebase Hosting
              uses: FirebaseExtended/action-hosting-deploy@v0
              with:
                  repoToken: "${{ secrets.GITHUB_TOKEN }}"
                  firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"
                  channelId: live
                  projectId: getxobelaeskola
                  entryPoint: apps/mission-control-ui
