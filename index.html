s que una Escuela,\",\"lifestyle_subtitle\":\"Un Estilo de Vida\",\"desc1\":\"En Getxo Bela Eskola no solo enseñamos a navegar. Ofrecemos la llave para conectar con el Cantábrico desde un prisma de excelencia, respeto y tradición.\",\"desc2\":\"Nuestra flota de J80, ubicada en el prestigioso Puerto Deportivo de Getxo, es el escenario donde forjamos navegantes apasionados bajo los más altos estándares de seguridad y confort.\",\"about_link\":\"Descubre nuestra Escuela\",\"live\":\"Vive\",\"the\":\"la\",\"passion\":\"Pasión\"},\"features\":{\"title\":\"Por qué elegirnos\",\"cert_title\":\"Certificación Oficial\",\"cert_desc\":\"Titulaciones reconocidas para navegar en cualquier mar.\",\"staff_title\":\"Instructores Expertos\",\"staff_desc\":\"Aprende de navegantes con miles de millas de experiencia.\",\"comm_title\":\"Comunidad Activa\",\"comm_desc\":\"Únete a un club de apasionados por la vela y el Cantábrico.\"}},\"courses_page\":{\"header_badge\":\"Nuestra Oferta\",\"header_title\":\"Cursos de\",\"header_highlight\":\"Navegación\",\"header_desc\":\"Desde los primeros pasos en la vela ligera hasta las titulaciones de recreo más avanzadas. En nuestra escuela en Getxo, cada curso es una experiencia diseñada para la excelencia.\",\"duration\":\"h\",\"price_from\":\"Desde\"},\"about_page\":{\"header_badge\":\"Getxo Bela Eskola\",\"header_title\":\"Nuestra Pasión es el\",\"header_highlight\":\"Mar\",\"header_suffix\":\"Excelencia Náutica en Arriluze\",\"since\":\"Fundada en Getxo\",\"desc1\":\"Getxo Bela Eskola nace con el propósito de acercar el mundo de la vela a todas aquellas personas que deseen disfrutar del Cantábrico de una forma diferente. Ubicada en el Muelle Arriluzea, contamos con unas instalaciones privilegiadas para que tu experiencia sea completa.\",\"desc2\":\"Desde la navegación recreativa hasta la competición y la vida a bordo, nuestra metodología se basa en la práctica constante y el respeto por el medio marino. Formamos tripulaciones, no solo navegantes.\",\"values\":{\"v1_title\":\"Nuestras Instalaciones\",\"v1_desc\":\"Visítanos en el Muelle Arriluzea. Disponemos de aulas para clases teóricas, sala de audiovisuales, pañol, taller y vestuarios con acceso privado al puerto.\",\"v2_title\":\"Equipo Humano\",\"v2_desc\":\"Un grupo apasionado que incluye educadores sociales, biólogos marinos y técnicos expertos en mantenimiento naval.\",\"v3_title\":\"Filosofía y Vida\",\"v3_desc\":\"Entendemos la navegación como un viaje de crecimiento personal, basado en la máxima preparación técnica y el respeto al mar.\"},\"team_section_title\":\"La Tripulación\",\"team\":{\"member1_name\":\"Angharad Arambalza\",\"member1_role\":\"Coordinadora de Tierra\",\"member1_desc\":\"Educadora social y amante del mar. Su empatía y energía son el corazón de nuestra logística en tierra.\",\"member2_name\":\"Urko Santillán\",\"member2_role\":\"Jefe Técnico\",\"member2_desc\":\"Nuestro experto en mantenimiento. Se asegura de que cada embarcación de la flota esté en estado impecable.\",\"member3_name\":\"Ana de Lara\",\"member3_role\":\"Bióloga Marina\",\"member3_desc\":\"Científica y buceadora. Nos asesora sobre la biodiversidad del Cantábrico y la geografía de nuestra costa.\"},\"commitment_title\":\"Comprometidos con la\",\"commitment_highlight\":\"Cultura del Mar\",\"define_badge\":\"Nuestra Esencia\",\"define_title\":\"Lo que nos define\",\"cta_title\":\"¿Listo para zarpar?\",\"cta_desc\":\"Únete a nuestra escuela y descubre por qué somos el referente de navegación en el Cantábrico.\",\"cta_button\":\"Ver Cursos Disponibles\"},\"contact_page\":{\"header_badge\":\"Contacto\",\"header_title\":\"Hablemos de\",\"header_highlight\":\"Navegar\",\"location_label\":\"Ubicación\",\"location_val\":\"Muelle Arriluzea, s/n\\n48990 Getxo, Vizcaya\",\"contact_label\":\"Email \u0026 Teléfono\",\"hours_label\":\"Horario\",\"hours_val\":\"Lunes a Domingo\\n09:00 — 20:00\"},\"newsletter\":{\"title\":\"Suscríbete a la Newsletter\",\"subtitle\":\"Recibe noti
